openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: VeriFactu SaaS API - Sistema de Facturación AEAT
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: organizations
    description: Organizations and tenants
  - name: taxpayers
    description: Taxpayer profiles (obligados tributarios)
  - name: clients
    description: Clients and customers
  - name: products
    description: Products and services catalog
  - name: series
    description: Invoice series
  - name: invoices
    description: Invoice management
  - name: verifactu
    description: VeriFactu records and submissions
  - name: documents
    description: Document upload and OCR
  - name: dashboard
    description: Dashboard and analytics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Auth
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # Organizations
  /organizations:
    get:
      operationId: listOrganizations
      tags: [organizations]
      summary: List user's organizations
      responses:
        "200":
          description: Organizations list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Organization"
    post:
      operationId: createOrganization
      tags: [organizations]
      summary: Create organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrganizationBody"
      responses:
        "201":
          description: Organization created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"

  /organizations/{id}:
    get:
      operationId: getOrganization
      tags: [organizations]
      summary: Get organization
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateOrganization
      tags: [organizations]
      summary: Update organization
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrganizationBody"
      responses:
        "200":
          description: Organization updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"

  # Taxpayers
  /organizations/{orgId}/taxpayers:
    get:
      operationId: listTaxpayers
      tags: [taxpayers]
      summary: List taxpayer profiles for organization
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Taxpayers list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaxpayerProfile"
    post:
      operationId: createTaxpayer
      tags: [taxpayers]
      summary: Create taxpayer profile
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaxpayerBody"
      responses:
        "201":
          description: Taxpayer created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxpayerProfile"

  /taxpayers/{id}:
    get:
      operationId: getTaxpayer
      tags: [taxpayers]
      summary: Get taxpayer profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Taxpayer profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxpayerProfile"
    patch:
      operationId: updateTaxpayer
      tags: [taxpayers]
      summary: Update taxpayer profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaxpayerBody"
      responses:
        "200":
          description: Taxpayer updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxpayerProfile"

  # Clients
  /taxpayers/{taxpayerId}/clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List clients for taxpayer
      parameters:
        - name: taxpayerId
          in: path
          required: true
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Clients list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create client
      parameters:
        - name: taxpayerId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientBody"
      responses:
        "201":
          description: Client created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /clients/{id}:
    get:
      operationId: getClient
      tags: [clients]
      summary: Get client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
    patch:
      operationId: updateClient
      tags: [clients]
      summary: Update client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClientBody"
      responses:
        "200":
          description: Client updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
    delete:
      operationId: deleteClient
      tags: [clients]
      summary: Delete client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Products
  /taxpayers/{taxpayerId}/products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products and services
      parameters:
        - name: taxpayerId
          in: path
          required: true
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Products list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create product or service
      parameters:
        - name: taxpayerId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductBody"
      responses:
        "200":
          description: Product updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Series
  /taxpayers/{taxpayerId}/series:
    get:
      operationId: listSeries
      tags: [series]
      summary: List invoice series
      parameters:
        - name: taxpayerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Series list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InvoiceSeries"
    post:
      operationId: createSeries
      tags: [series]
      summary: Create invoice series
      parameters:
        - name: taxpayerId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSeriesBody"
      responses:
        "201":
          description: Series created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceSeries"

  /series/{id}:
    patch:
      operationId: updateSeries
      tags: [series]
      summary: Update series
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSeriesBody"
      responses:
        "200":
          description: Series updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceSeries"

  # Invoices
  /taxpayers/{taxpayerId}/invoices:
    get:
      operationId: listInvoices
      tags: [invoices]
      summary: List invoices
      parameters:
        - name: taxpayerId
          in: path
          required: true
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
        - name: clientId
          in: query
          schema:
            type: ["integer", "null"]
        - name: dateFrom
          in: query
          schema:
            type: string
        - name: dateTo
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Invoices list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceListResponse"
    post:
      operationId: createInvoice
      tags: [invoices]
      summary: Create invoice (draft or emit)
      parameters:
        - name: taxpayerId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvoiceBody"
      responses:
        "201":
          description: Invoice created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /invoices/{id}:
    get:
      operationId: getInvoice
      tags: [invoices]
      summary: Get invoice details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
    patch:
      operationId: updateInvoice
      tags: [invoices]
      summary: Update invoice draft
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInvoiceBody"
      responses:
        "200":
          description: Invoice updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
    delete:
      operationId: deleteInvoice
      tags: [invoices]
      summary: Delete invoice draft
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /invoices/{id}/emit:
    post:
      operationId: emitInvoice
      tags: [invoices]
      summary: Emit invoice (convert draft to issued)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice emitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /invoices/{id}/cancel:
    post:
      operationId: cancelInvoice
      tags: [invoices]
      summary: Cancel emitted invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelInvoiceBody"
      responses:
        "200":
          description: Invoice cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /invoices/{id}/rectify:
    post:
      operationId: rectifyInvoice
      tags: [invoices]
      summary: Create rectification invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RectifyInvoiceBody"
      responses:
        "201":
          description: Rectification invoice created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /invoices/{id}/pdf:
    get:
      operationId: getInvoicePdf
      tags: [invoices]
      summary: Download invoice PDF
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  # VeriFactu
  /taxpayers/{taxpayerId}/verifactu/records:
    get:
      operationId: listVeriFactuRecords
      tags: [verifactu]
      summary: List VeriFactu records
      parameters:
        - name: taxpayerId
          in: path
          required: true
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: VeriFactu records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VeriFactuRecordListResponse"

  /verifactu/records/{id}:
    get:
      operationId: getVeriFactuRecord
      tags: [verifactu]
      summary: Get VeriFactu record detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: VeriFactu record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VeriFactuRecord"

  /verifactu/records/{id}/submit:
    post:
      operationId: submitVeriFactuRecord
      tags: [verifactu]
      summary: Submit VeriFactu record to AEAT
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Submission result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VeriFactuRecord"

  /verifactu/records/{id}/retry:
    post:
      operationId: retryVeriFactuRecord
      tags: [verifactu]
      summary: Retry failed VeriFactu submission
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Retry result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VeriFactuRecord"

  # Documents / OCR
  /taxpayers/{taxpayerId}/documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List uploaded documents
      parameters:
        - name: taxpayerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Documents list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UploadedDocument"
    post:
      operationId: uploadDocument
      tags: [documents]
      summary: Upload document for OCR extraction
      parameters:
        - name: taxpayerId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadDocumentBody"
      responses:
        "201":
          description: Document uploaded and OCR started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadedDocument"

  /documents/{id}:
    get:
      operationId: getDocument
      tags: [documents]
      summary: Get document with OCR extraction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Document with extraction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadedDocument"
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /documents/{id}/create-draft:
    post:
      operationId: createDraftFromDocument
      tags: [documents]
      summary: Create invoice draft from OCR extraction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Draft created from OCR
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  # Dashboard
  /taxpayers/{taxpayerId}/dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      parameters:
        - name: taxpayerId
          in: path
          required: true
          schema:
            type: integer
        - name: year
          in: query
          schema:
            type: integer
        - name: month
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /taxpayers/{taxpayerId}/dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed
      parameters:
        - name: taxpayerId
          in: path
          required: true
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /taxpayers/{taxpayerId}/dashboard/aeat-status:
    get:
      operationId: getAeatStatus
      tags: [dashboard]
      summary: Get AEAT submission status overview
      parameters:
        - name: taxpayerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: AEAT status overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AeatStatusOverview"

  /taxpayers/{taxpayerId}/dashboard/vat-summary:
    get:
      operationId: getVatSummary
      tags: [dashboard]
      summary: Get VAT summary by period
      parameters:
        - name: taxpayerId
          in: path
          required: true
          schema:
            type: integer
        - name: year
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: VAT summary by period
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VatPeriodSummary"

  # Gestoria multi-client overview
  /organizations/{orgId}/gestoria/overview:
    get:
      operationId: getGestoriaOverview
      tags: [organizations]
      summary: Get gestoria overview across all managed taxpayers
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Gestoria overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GestoriaOverview"

  /organizations/{orgId}/gestoria/incidents:
    get:
      operationId: listGestoriaIncidents
      tags: [organizations]
      summary: List AEAT incidents across all managed taxpayers
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Incidents list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AeatIncident"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    # Auth
    LoginBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    RegisterBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        name:
          type: string
      required:
        - email
        - password
        - name

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
      required:
        - user
        - token

    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - name
        - createdAt

    # Organizations
    Organization:
