kind = "web"
previewPath = "/"
title = "VeriFactu SaaS - Facturación AEAT"
version = "1.0.0"
id = "artifacts/verifactu"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22578

[services.development]
run = "pnpm --filter @workspace/verifactu run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/verifactu", "run", "build" ]
publicDir = "artifacts/verifactu/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22578"
BASE_PATH = "/"
